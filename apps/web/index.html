<!doctype html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0b0d" />
    <meta
      name="description"
      content="DriverHub ajuda motoristas a aumentarem seus ganhos com benefícios, descontos e atendimento direto pelo WhatsApp."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DriverHub" />
    <meta property="og:title" content="DriverHub | Ganhe mais como motorista" />
    <meta
      property="og:description"
      content="Benefícios, cashback e descontos exclusivos para motoristas profissionais."
    />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <!--
      Material Symbols Outlined — subset to only the glyphs the UI actually uses.
      Adding a new icon? Append its name to the `icon_names` querystring below.
      Smaller payload than loading the full font (~50 KB → ~12 KB).
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&icon_names=account_circle,arrow_back,arrow_forward,build,check,check_circle,chevron_right,close,confirmation_number,content_copy,credit_card,dark_mode,devices,error,info,light_mode,local_gas_station,location_on,logout,menu,my_location,payments,person,pix,qr_code_2,savings,search,shopping_bag,shopping_cart,star,storefront,sync,trending_up,verified,warning"
      rel="stylesheet"
    />
    <title>DriverHub | Ganhe mais como motorista</title>
    <script>
      // Apply the saved theme synchronously to avoid a light flash before React mounts.
      (function () {
        try {
          var stored = localStorage.getItem("opendriver-theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var mode = stored === "light" || stored === "dark" ? stored : prefersDark ? "dark" : "light";
          if (mode === "dark") document.documentElement.classList.add("dark");
          document.documentElement.dataset.theme = mode;
          document.documentElement.style.colorScheme = mode;
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-surface text-on-surface antialiased dark:bg-dark-bg dark:text-dark-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Real client IP comes via the reverse-proxy chain (Cloudflare → host nginx → here).
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Don't leak the upstream version in error pages.
    server_tokens off;

    # Compression for text-like responses. Brotli would be nicer but isn't in the stock image.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # Security headers — the API also sets these via helmet; we duplicate here so the
    # initial HTML response (served from nginx) is hardened even before JS boots.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Static assets: long, immutable cache. Vite emits content-hashed filenames so it's safe.
    location ~* ^/assets/.*\.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpe?g|gif|webp|avif|ico)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker / manifest must not be cached aggressively.
    location ~* ^/(sw\.js|manifest\.webmanifest|robots\.txt)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback. index.html is short-cached so deploys land within the next page load.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
